server:
  port: 8083

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      serviceA:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED

  retry:
    instances:
      serviceA:
        maxAttempts: 3 # Number of retry attempts
        waitDuration: 10s # Wait duration between retries

  ratelimiter:
    instances:
      serviceA:
        registerHealthIndicator: false
        limitForPeriod: 10 # allow 10 request only in 10 seconds 
        limitRefreshPeriod: 10s
        timeoutDuration: 3s # Wait up to 3 seconds for permission before failing

  bulkhead: # Semaphore Bulkhead
    instances:
      bulkheadService:
        maxConcurrentCalls: 5  # Only 5 parallel requests allowed
        maxWaitDuration: 2s

  thread-pool-bulkhead: # ThreadPool Bulkhead use in microservices
    instances:
      threadPoolBulkheadService:
        coreThreadPoolSize: 2
        maxThreadPoolSize: 4
        queueCapacity: 10
